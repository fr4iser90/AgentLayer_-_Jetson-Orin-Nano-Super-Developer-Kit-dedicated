<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>First setup — Admin</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
      --err: #e07070;
      --ok: #7bc96f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 0.35rem; text-align: center; }
    .subtitle { color: var(--muted); text-align: center; margin-bottom: 1.25rem; font-size: 0.9rem; }
    .warn {
      background: rgba(224, 112, 112, 0.1);
      border: 1px solid var(--err);
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    label { display: block; margin-bottom: 0.35rem; font-size: 0.85rem; color: var(--muted); }
    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 0.85rem;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      background: var(--accent);
      color: #0a0e14;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      width: 100%;
      margin-top: 0.25rem;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; font-size: 0.85rem; display: none; }
    .status.ok { display: block; background: rgba(123, 201, 111, 0.12); border: 1px solid var(--ok); }
    .status.err { display: block; background: rgba(224, 112, 112, 0.12); border: 1px solid var(--err); }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="box">
    <h1>First setup</h1>
    <p class="subtitle">Create the first admin account (one time)</p>
    <div class="warn">
      Find the <strong>OTP</strong> in <strong>container logs</strong> on first start (or set <span style="font-family:ui-monospace,monospace">AGENT_ADMIN_CLAIM_OTP</span> before start). Without a valid OTP there is no access — including on the public internet.
    </div>
    <label for="otp">Bootstrap OTP</label>
    <input type="password" id="otp" autocomplete="off" />
    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="email" />
    <label for="password">Password (min. 8 characters)</label>
    <input type="password" id="password" autocomplete="new-password" />
    <label for="password2">Confirm password</label>
    <input type="password" id="password2" autocomplete="new-password" />
    <button type="button" id="btn">Create admin and sign in</button>
    <div id="status" class="status"></div>
    <p style="margin-top:1rem;text-align:center;font-size:0.85rem;color:var(--muted);">
      <a href="/control/login.html">Go to login</a> (if setup is already done)
    </p>
  </div>
  <script src="js/auth.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    function show(ok, msg) {
      const el = $("status");
      el.className = "status " + (ok ? "ok" : "err");
      el.textContent = msg;
    }
    $("btn").onclick = async () => {
      const otp = $("otp").value.trim();
      const email = $("email").value.trim();
      const password = $("password").value;
      const password2 = $("password2").value;
      if (!otp || !email || password.length < 8) {
        show(false, "Fill in OTP, email, and password (≥8).");
        return;
      }
      if (password !== password2) {
        show(false, "Passwords do not match.");
        return;
      }
      $("btn").disabled = true;
      try {
        const r = await fetch("/auth/claim", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, otp }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          show(false, data.detail || data.error || ("Error " + r.status));
          $("btn").disabled = false;
          return;
        }
        if (data.access_token) {
          localStorage.setItem("agent_access_token", data.access_token);
          if (data.refresh_token) localStorage.setItem("agent_refresh_token", data.refresh_token);
          if (data.user) localStorage.setItem("agent_user", JSON.stringify(data.user));
        }
        show(true, "Admin created. Redirecting to dashboard…");
        setTimeout(() => { window.location.href = "/control/dashboard.html"; }, 600);
      } catch (e) {
        show(false, "Network error: " + (e && e.message));
        $("btn").disabled = false;
      }
    };
    fetch("/auth/setup-status")
      .then((r) => r.json())
      .then((j) => {
        if (j && j.needs_setup === false) {
          window.location.replace("/control/login.html");
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
