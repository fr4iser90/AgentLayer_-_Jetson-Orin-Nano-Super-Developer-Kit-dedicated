# Agent layer + PostgreSQL. Netzwerk ai-net (wie examples/ollama/docker/compose.yaml).
#
# Variablen: docker/.env (von .env.example kopieren). Compose lädt .env automatisch.
#
# Start:
#   docker compose up -d
#
# Open WebUI: OpenAI API URL → http://agent-layer:8080/v1 (im gleichen Docker-Netz)
#   oder vom Host: http://HOST_IP:8088/v1
#
# Modell mit Tool Calling (z. B. llama3.1, qwen2.5).
services:
  postgres:
    # pgvector extension required for RAG (migration 6). Existing volumes: backup before switching image if needed.
    image: pgvector/pgvector:pg16
    container_name: agent-layer-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - agent_pg_data:/var/lib/postgresql/data
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s
  agent-layer:
    build:
      context: .
      dockerfile: Dockerfile
    image: jetpack-agent-layer:local
    container_name: agent-layer
    # "no": missing AGENT_INITIAL_ADMIN_* exits the process — avoid infinite restart + repeated Alembic.
    # After first successful boot, you can set restart: unless-stopped if you want crash recovery.
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AGENT_HTTP_PORT:-8088}:8080"
    env_file:
      - .env
    environment:
      # Nur Playwright-Install (Web-UI): Pfade auf Named Volumes — kein PIDEA_CDP_* (CDP = Admin → IDE Agent / DB).
      PIDEA_PLAYWRIGHT_PIP_TARGET: /data/pidea/playwright-site-packages
      PLAYWRIGHT_BROWSERS_PATH: /data/pidea/ms-playwright
    volumes:
      # create_tool / Default AGENT_TOOLS_EXTRA_DIR=/data/tools — ohne Mount existiert der Pfad nicht.
      - ./plugins/tools/agent/agent_created:/data/tools:rw
      - pidea_playwright_site:/data/pidea/playwright-site-packages
      - pidea_playwright_browsers:/data/pidea/ms-playwright
      - pidea_pip_cache:/root/.cache/pip
      # Backups (replace_tool/update_tool): Default /data/tool_backups liegt NICHT auf diesem Mount →
      # in .env setzen: AGENT_TOOLS_BACKUP_DIR=/data/tools/.tool_backups (Ordner erscheint unter ./plugins/tools/agent/agent_created/.tool_backups)
    # Optional read-only:  - ./plugins/tools/agent/agent_created:/data/tools:ro
    # Optional: mount dirs for fs_* if you need host files in-container (paths are cwd/absolute; no AGENT_WORKSPACE_ROOT).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-net
volumes:
  agent_pg_data:
  pidea_playwright_site:
  pidea_playwright_browsers:
  pidea_pip_cache:
networks:
  ai-net:
    external: true
